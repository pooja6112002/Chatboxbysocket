<!DOCTYPE html>
<html>
<head>
    <title>Premium Chat</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #020617);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 420px;
            height: 620px;
            background: #1e293b;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        .chat-header {
            padding: 18px;
            background: #020617;
            color: #22c55e;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            border-bottom: 1px solid #334155;
            letter-spacing: 1px;
        }

        .chat-box {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .message {
            padding: 12px 16px;
            margin: 6px 0;
            border-radius: 18px;
            max-width: 70%;
            word-wrap: break-word;
            font-size: 14px;
        }

        .sent {
            background: #22c55e;
            color: black;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .received {
            background: #334155;
            color: white;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .chat-input {
            display: flex;
            padding: 12px;
            background: #020617;
            border-top: 1px solid #334155;
        }

        .chat-input input {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            outline: none;
            font-size: 14px;
            background: #0f172a;
            color: white;
        }

        .chat-input button {
            margin-left: 10px;
            padding: 12px 16px;
            border: none;
            border-radius: 12px;
            background: #22c55e;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .chat-input button:hover {
            background: #16a34a;
        }

        /* scrollbar styling */
        .chat-box::-webkit-scrollbar {
            width: 6px;
        }

        .chat-box::-webkit-scrollbar-thumb {
            background: #22c55e;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="chat-container">

    <div class="chat-header">
        💬 Live Premium Chat
    </div>

    <div id="messages" class="chat-box"></div>

    <div class="chat-input">
        <input id="input" placeholder="Type your message..." />
        <button onclick="sendMsg()">Send</button>
    </div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>
    const socket = io();
    const messages = document.getElementById("messages");
    const input = document.getElementById("input");

    function sendMsg() {
        if (input.value.trim() !== "") {

            // server ko bhejna
            socket.emit("chat message", input.value);

            // apne side pe show (right side)
            addMessage(input.value, "sent");

            input.value = "";
        }
    }

    // dusre user ka msg receive
    socket.on("chat message", (msg) => {
        addMessage(msg, "received");
    });

    function addMessage(msg, type) {
        const div = document.createElement("div");
        div.classList.add("message", type);
        div.textContent = msg;

        messages.appendChild(div);

        // auto scroll
        messages.scrollTop = messages.scrollHeight;
    }

    // enter key support
    input.addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            sendMsg();
        }
    });
</script>

</body>
</html>
